name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.13.0

      - name: Build
        run: zig build

      - name: Test
        run: zig build test

      - name: Smoke test
        run: |
          echo '{"name":"alice","age":30}' | ./zig-out/bin/zq '.name'
          echo '{"users":[{"name":"bob"},{"name":"carol"}]}' | ./zig-out/bin/zq '.users[0].name'
          echo '[1,2,3]' | ./zig-out/bin/zq 'length'
          echo '{"a":1,"b":2}' | ./zig-out/bin/zq 'keys'

  build-macos:
    name: Build (macOS)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.13.0

      - name: Build
        run: zig build -Doptimize=ReleaseFast

      - name: Check binary size
        run: ls -lh zig-out/bin/zq
